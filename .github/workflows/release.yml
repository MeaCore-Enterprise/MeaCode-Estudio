# Build y release al pushear un tag de versión.
#
# Flujo recomendado:
#   1. Iguala la versión en package.json y src-tauri/Cargo.toml (mismo semver, ej. 1.0.0).
#   2. Commit y crea tag (cualquiera de los dos formatos):
#        git tag v1.0.0 && git push origin v1.0.0
#        git tag 1.0.0  && git push origin 1.0.0
#   3. El job valida que el tag (sin prefijo "v") coincida con esas versiones.
#
# Patrones de tag:
#   - v*     → v1.0.0, v2.3.4-rc.1, etc.
#   - *.*.*  → 1.0.0, 0.2.15 (semver X.Y.Z sin prefijo v)
#
# workflow_dispatch: útil para re-ejecutar un workflow ya asociado a un tag
# desde la pestaña Actions; no sustituye crear y pushear el tag.
name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  workflow_dispatch:

# Control de concurrencia: evita builds duplicados si se pushean tags rápido
# Para releases, sí cancelamos builds anteriores del mismo tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: .exe
            bundle_pattern: "**/*.exe"
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary_ext: ""
            bundle_pattern: "**/*.AppImage"
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_ext: ""
            bundle_pattern: "**/*.dmg"
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_ext: ""
            bundle_pattern: "**/*.dmg"

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION from tag: $TAG_NAME"

      - name: Validate version consistency
        shell: bash
        run: |
          CARGO_VERSION=$(grep -E '^version\s*=' src-tauri/Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/' | tr -d ' ')
          PACKAGE_VERSION=$(grep -E '"version"' package.json | head -1 | sed -E 's/.*"([^"]+)".*/\1/' | tr -d ' ')
          TAURI_CONF_VERSION=$(grep -E '"version"' src-tauri/tauri.conf.json | head -1 | sed -E 's/.*"([^"]+)".*/\1/' | tr -d ' ')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "package.json version: $PACKAGE_VERSION"
          echo "tauri.conf.json version: $TAURI_CONF_VERSION"
          echo "Tag version: $TAG_VERSION"
          
          if [ "$CARGO_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "❌ ERROR: Version mismatch between Cargo.toml and package.json!"
            echo "  Cargo.toml: $CARGO_VERSION"
            echo "  package.json: $PACKAGE_VERSION"
            exit 1
          fi

          if [ "$CARGO_VERSION" != "$TAURI_CONF_VERSION" ]; then
            echo "❌ ERROR: Version mismatch between Cargo.toml and src-tauri/tauri.conf.json!"
            echo "  Cargo.toml: $CARGO_VERSION"
            echo "  tauri.conf.json: $TAURI_CONF_VERSION"
            exit 1
          fi
          
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ ERROR: Tag version does not match Cargo.toml version!"
            echo "  Tag: $TAG_VERSION"
            echo "  Cargo.toml: $CARGO_VERSION"
            exit 1
          fi
          
          echo "✅ All versions match: $CARGO_VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache de Cargo: reduce builds de minutos a segundos
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup2.4-dev \
            pkg-config \
            patchelf

      - name: Verify Tauri icons exist
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            if [ ! -f "src-tauri/icons/icon.ico" ]; then
              echo "ERROR: icon.ico not found at src-tauri/icons/icon.ico"
              exit 1
            fi
            echo "✓ icon.ico found"
          elif [ "${{ matrix.os }}" == "ubuntu-22.04" ]; then
            if [ ! -f "src-tauri/icons/icon.png" ]; then
              echo "ERROR: icon.png not found at src-tauri/icons/icon.png"
              exit 1
            fi
            echo "✓ icon.png found"
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            if [ ! -f "src-tauri/icons/icon.icns" ]; then
              echo "ERROR: icon.icns not found at src-tauri/icons/icon.icns"
              exit 1
            fi
            echo "✓ icon.icns found"
          fi

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        id: build_tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: 'MeaCode Studio ${{ github.ref_name }}'
          releaseBody: |
            ## MeaCode Studio ${{ github.ref_name }}

            ### ✨ Características principales
            - 🚀 IDE IA-first con acciones contextuales
            - 💬 Chat IA integrado (Nexusify API)
            - 📝 Editor con Monaco y LSP
            - 🖥️ Terminal integrada (xterm.js)
            - 📁 Explorer de archivos
            - 🔍 Búsqueda rápida (Ctrl+P)
            - ⌨️ Command Palette (Ctrl+Shift+P)
            - 💾 Persistencia de sesión

            ### 🎯 Acciones IA sobre código
            - **Explain this**: Explica código seleccionado
            - **Fix error**: Corrige errores automáticamente
            - **Refactor**: Refactoriza código manteniendo funcionalidad

            ### 📦 Instalación
            Descarga el instalador para tu plataforma y ejecútalo.

            Más información en el [README.md](README.md)
          releaseDraft: true
          prerelease: false

      - name: Verify binaries exist
        if: success()
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            if [ -f "src-tauri/target/${{ matrix.target }}/release/meacode-studio.exe" ]; then
              echo "✅ Binary found: meacode-studio.exe"
              ls -lh "src-tauri/target/${{ matrix.target }}/release/meacode-studio.exe"
            else
              echo "❌ ERROR: Binary not found!"
              find src-tauri/target/${{ matrix.target }}/release -name "*.exe" -o -name "*.msi" -o -name "*.nsis.zip" || true
              exit 1
            fi
          elif [ "${{ matrix.os }}" == "ubuntu-22.04" ]; then
            if [ -f "src-tauri/target/${{ matrix.target }}/release/meacode-studio" ]; then
              echo "✅ Binary found: meacode-studio"
              ls -lh "src-tauri/target/${{ matrix.target }}/release/meacode-studio"
            else
              echo "❌ ERROR: Binary not found!"
              find src-tauri/target/${{ matrix.target }}/release -name "meacode-studio" -o -name "*.AppImage" -o -name "*.deb" || true
              exit 1
            fi
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            if [ -d "src-tauri/target/${{ matrix.target }}/release/bundle/macos/MeaCode Studio.app" ]; then
              echo "✅ Binary found: MeaCode Studio.app"
              ls -lh "src-tauri/target/${{ matrix.target }}/release/bundle/macos/MeaCode Studio.app"
            else
              echo "❌ ERROR: Binary not found!"
              find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.app" -o -name "*.dmg" || true
              exit 1
            fi
          fi

      - name: Generate checksums
        if: success()
        shell: bash
        run: |
          mkdir -p checksums
          
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            find src-tauri/target/${{ matrix.target }}/release/bundle -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.zip" \) | while read file; do
              filename=$(basename "$file")
              if command -v sha256sum >/dev/null 2>&1; then
                sha256sum "$file" > "checksums/${filename}.sha256"
              elif command -v shasum >/dev/null 2>&1; then
                shasum -a 256 "$file" > "checksums/${filename}.sha256"
              fi
              echo "Generated checksum for: $filename"
            done
          elif [ "${{ matrix.os }}" == "ubuntu-22.04" ]; then
            find src-tauri/target/${{ matrix.target }}/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" \) | while read file; do
              filename=$(basename "$file")
              sha256sum "$file" > "checksums/${filename}.sha256"
              echo "Generated checksum for: $filename"
            done
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            find src-tauri/target/${{ matrix.target }}/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" \) | while read file; do
              filename=$(basename "$file")
              shasum -a 256 "$file" > "checksums/${filename}.sha256"
              echo "Generated checksum for: $filename"
            done
          fi
          
          if [ -d checksums ] && [ "$(ls -A checksums 2>/dev/null)" ]; then
            echo "✅ Checksums generated:"
            ls -lh checksums/
          else
            echo "⚠️ No checksums generated (no bundle files found)"
          fi

      - name: Upload checksums
        if: success() && hashFiles('checksums/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.os }}-${{ matrix.target }}
          path: checksums/
          retention-days: 90

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.os }}-${{ matrix.target }}
          path: |
            src-tauri/target/**/*.log
            src-tauri/target/**/build.log
          retention-days: 7
          if-no-files-found: ignore